name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  validate-manifests:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-arm64.tar.gz | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/
      - name: Validate deploy manifests
        run: |
          kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.32.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            deploy/manifests/web/*.yaml

  docker-build-check:
    if: github.event_name == 'pull_request'
    needs: lint-typecheck-build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/arm64

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-typecheck-build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tag
        id: meta
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/aporiax-pulse" >> "$GITHUB_OUTPUT"
          echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-12)" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
      # ADR-0006 regression guard: Harbor was removed after shipping an
      # amd64-only image to an arm64 node. Fail the build rather than
      # discover an arch mismatch at deploy time.
      - name: Verify linux/arm64 manifest
        run: |
          INSPECT=$(docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}")
          echo "$INSPECT"
          echo "$INSPECT" | grep -q "linux/arm64" || {
            echo "::error::linux/arm64 platform not found in pushed manifest"
            exit 1
          }
